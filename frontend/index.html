<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Search Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🔍 Mini Search Engine</h1>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search documents..."
        >
        <button id="searchBtn">Search</button>
    </div>

    <div id="suggestions" class="suggestions"></div>

    <div class="panel">

        <h2>Search Results</h2>

        <div id="results">
            <p>No search performed.</p>
        </div>

    </div>

    <div class="panel">

        <h2>Statistics</h2>

        <div id="stats">

            <p>Indexed Documents: 6</p>
            <p>Total Searches: 0</p>

        </div>

    </div>

    <div class="panel">

        <h2>Indexed Documents</h2>

        <ul>

            <li>cpp.txt</li>
            <li>dsa.txt</li>
            <li>cloud.txt</li>
            <li>dbms.txt</li>
            <li>networking.txt</li>
            <li>os.txt</li>

        </ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
